<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cantos Sagrados</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<header>
    <h1>Cantos Sagrados</h1>
</header>

<div class="container">

    <!-- PRIMEIRA TELA -->
    <div id="dadosCelebracao">

        <h2>Dados da Celebração</h2>

        <label for="comunidade">Comunidade</label>
        <input
            type="text"
            id="comunidade"
            placeholder="Ex.: Sagrado Coração de Jesus">

        <label for="celebracao">Celebração</label>
        <input
            type="text"
            id="celebracao"
            placeholder="Ex.: São Pedro e São Paulo">

        <label for="dataCelebracao">Data</label>
        <input
            type="date"
            id="dataCelebracao">

        <label for="celebrante">Celebrante</label>
        <input
            type="text"
            id="celebrante"
            placeholder="Ex.: Padre Ângelo">

        <label for="equipe">Equipe de Música</label>
        <input
            type="text"
            id="equipe"
            placeholder="Ex.: Marlon, Simone">

        <button id="btnContinuar">
            Continuar →
        </button>

    </div>

    <!-- SEGUNDA TELA -->
    <div id="selecaoCantos" style="display:none;">

        <div id="resumoCelebracao">

            <h2>Folha da Celebração</h2>

            <p><strong>Comunidade:</strong> <span id="rComunidade"></span></p>

            <p><strong>Celebração:</strong> <span id="rCelebracao"></span></p>

            <p><strong>Data:</strong> <span id="rData"></span></p>

            <p><strong>Celebrante:</strong> <span id="rCelebrante"></span></p>

            <p><strong>Equipe:</strong> <span id="rEquipe"></span></p>

        </div>

        <input
            type="text"
            id="pesquisa"
            placeholder="Pesquisar canto...">

        <div id="listaCantos"></div>

        <button id="gerarPDF">
            Gerar PDF
        </button>

    </div>

</div>

<script src="app.js"></script>

</body>

</html>
